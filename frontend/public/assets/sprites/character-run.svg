  <!-- Frame 6: Wide stride left -->
  <g transform="translate(640,0)">
    <rect x="52" y="12" width="24" height="24" fill="#16e0bd"/>
    <rect x="48" y="36" width="32" height="34" fill="#16e0bd"/>
    <rect x="82" y="38" width="12" height="26" fill="#16e0bd"/>
    <rect x="34" y="46" width="12" height="18" fill="#16e0bd"/>
    <rect x="74" y="70" width="14" height="30" fill="#16e0bd"/>
    <rect x="82" y="96" width="14" height="12" fill="#16e0bd"/>
    <rect x="36" y="70" width="14" height="30" fill="#16e0bd"/>
    <rect x="28" y="96" width="14" height="12" fill="#16e0bd"/>
    <circle cx="42" cy="32" r="4" fill="#00ffcc" opacity="0.9"/>
