<svg xmlns="http://www.w3.org/2000/svg" width="512" height="128" viewBox="0 0 512 128">
  <!-- Frame 1: Standing tall -->
  <g transform="translate(0,0)">
    <!-- Head -->
    <rect x="52" y="16" width="24" height="24" fill="#16e0bd"/>
    <!-- Body -->
    <rect x="48" y="40" width="32" height="36" fill="#16e0bd"/>
    <!-- Left arm -->
    <rect x="36" y="44" width="12" height="28" fill="#16e0bd"/>
    <!-- Right arm -->
    <rect x="80" y="44" width="12" height="28" fill="#16e0bd"/>
    <!-- Left leg -->
    <rect x="48" y="76" width="14" height="32" fill="#16e0bd"/>
    <!-- Right leg -->
    <rect x="66" y="76" width="14" height="32" fill="#16e0bd"/>
    <!-- Mic glow -->
    <circle cx="44" cy="36" r="4" fill="#00ffcc" opacity="0.8"/>
    <circle cx="44" cy="36" r="6" fill="#00ffcc" opacity="0.3"/>
  </g>

  <!-- Frame 2: Slightly shorter (breathing in) -->
  <g transform="translate(128,0)">
    <rect x="52" y="18" width="24" height="24" fill="#16e0bd"/>
    <rect x="48" y="42" width="32" height="34" fill="#16e0bd"/>
    <rect x="36" y="46" width="12" height="26" fill="#16e0bd"/>
    <rect x="80" y="46" width="12" height="26" fill="#16e0bd"/>
    <rect x="48" y="76" width="14" height="32" fill="#16e0bd"/>
    <rect x="66" y="76" width="14" height="32" fill="#16e0bd"/>
    <circle cx="44" cy="38" r="4" fill="#00ffcc" opacity="0.9"/>
    <circle cx="44" cy="38" r="6" fill="#00ffcc" opacity="0.35"/>
  </g>

  <!-- Frame 3: Shortest (breathing peak) -->
  <g transform="translate(256,0)">
    <rect x="52" y="20" width="24" height="24" fill="#16e0bd"/>
    <rect x="48" y="44" width="32" height="32" fill="#16e0bd"/>
    <rect x="36" y="48" width="12" height="24" fill="#16e0bd"/>
    <rect x="80" y="48" width="12" height="24" fill="#16e0bd"/>
    <rect x="48" y="76" width="14" height="32" fill="#16e0bd"/>
    <rect x="66" y="76" width="14" height="32" fill="#16e0bd"/>
    <circle cx="44" cy="40" r="4" fill="#00ffcc" opacity="1"/>
    <circle cx="44" cy="40" r="6" fill="#00ffcc" opacity="0.4"/>
  </g>

  <!-- Frame 4: Back to slightly shorter -->
  <g transform="translate(384,0)">
    <rect x="52" y="18" width="24" height="24" fill="#16e0bd"/>
    <rect x="48" y="42" width="32" height="34" fill="#16e0bd"/>
    <rect x="36" y="46" width="12" height="26" fill="#16e0bd"/>
    <rect x="80" y="46" width="12" height="26" fill="#16e0bd"/>
    <rect x="48" y="76" width="14" height="32" fill="#16e0bd"/>
    <rect x="66" y="76" width="14" height="32" fill="#16e0bd"/>
    <circle cx="44" cy="38" r="4" fill="#00ffcc" opacity="0.85"/>
    <circle cx="44" cy="38" r="6" fill="#00ffcc" opacity="0.3"/>
  </g>
</svg>