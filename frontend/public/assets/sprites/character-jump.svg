<svg xmlns="http://www.w3.org/2000/svg" width="640" height="128" viewBox="0 0 640 128">
  <!-- Frame 1: Crouch -->
  <g transform="translate(0,0)">
    <rect x="52" y="36" width="24" height="24" fill="#16e0bd"/>
    <rect x="46" y="60" width="36" height="24" fill="#16e0bd"/>
    <rect x="34" y="56" width="12" height="20" fill="#16e0bd"/>
    <rect x="82" y="56" width="12" height="20" fill="#16e0bd"/>
    <!-- Bent legs -->
    <rect x="44" y="84" width="16" height="16" fill="#16e0bd"/>
    <rect x="68" y="84" width="16" height="16" fill="#16e0bd"/>
    <rect x="40" y="100" width="20" height="12" fill="#16e0bd"/>
    <rect x="68" y="100" width="20" height="12" fill="#16e0bd"/>
    <circle cx="44" cy="54" r="4" fill="#00ffcc" opacity="0.8"/>
  </g>

  <!-- Frame 2: Launch (legs extending down) -->
  <g transform="translate(128,0)">
    <rect x="52" y="10" width="24" height="24" fill="#16e0bd"/>
    <rect x="48" y="34" width="32" height="32" fill="#16e0bd"/>
    <rect x="36" y="32" width="12" height="28" fill="#16e0bd"/>
    <rect x="80" y="36" width="12" height="24" fill="#16e0bd"/>
    <!-- Legs pushing down -->
    <rect x="48" y="66" width="14" height="34" fill="#16e0bd"/>
    <rect x="66" y="66" width="14" height="34" fill="#16e0bd"/>
    <rect x="46" y="100" width="18" height="12" fill="#16e0bd"/>
    <rect x="64" y="100" width="18" height="12" fill="#16e0bd"/>
    <circle cx="44" cy="30" r="4" fill="#00ffcc" opacity="0.9"/>
  </g>

  <!-- Frame 3: Peak (legs tucked, arms up) -->
  <g transform="translate(256,0)">
    <rect x="52" y="8" width="24" height="24" fill="#16e0bd"/>
    <rect x="48" y="32" width="32" height="30" fill="#16e0bd"/>
    <!-- Arms raised -->
    <rect x="36" y="20" width="12" height="28" fill="#16e0bd"/>
    <rect x="80" y="24" width="12" height="24" fill="#16e0bd"/>
    <!-- Legs tucked -->
    <rect x="46" y="62" width="16" height="18" fill="#16e0bd"/>
    <rect x="66" y="62" width="16" height="18" fill="#16e0bd"/>
    <circle cx="44" cy="28" r="5" fill="#00ffcc" opacity="1"/>
    <circle cx="44" cy="28" r="8" fill="#00ffcc" opacity="0.3"/>
  </g>

  <!-- Frame 4: Fall (legs slightly extended, arms back) -->
  <g transform="translate(384,0)">
    <rect x="52" y="14" width="24" height="24" fill="#16e0bd"/>
    <rect x="48" y="38" width="32" height="30" fill="#16e0bd"/>
    <rect x="36" y="44" width="12" height="26" fill="#16e0bd"/>
    <rect x="80" y="40" width="12" height="28" fill="#16e0bd"/>
    <!-- Legs dangling -->
    <rect x="46" y="68" width="14" height="28" fill="#16e0bd"/>
    <rect x="66" y="68" width="14" height="24" fill="#16e0bd"/>
    <circle cx="44" cy="34" r="4" fill="#00ffcc" opacity="0.8"/>
  </g>

  <!-- Frame 5: Land (crouch impact) -->
  <g transform="translate(512,0)">
    <rect x="52" y="32" width="24" height="24" fill="#16e0bd"/>
    <rect x="44" y="56" width="40" height="26" fill="#16e0bd"/>
    <rect x="32" y="56" width="12" height="22" fill="#16e0bd"/>
    <rect x="84" y="56" width="12" height="22" fill="#16e0bd"/>
    <!-- Wide bent legs -->
    <rect x="40" y="82" width="16" height="18" fill="#16e0bd"/>
    <rect x="72" y="82" width="16" height="18" fill="#16e0bd"/>
    <rect x="36" y="100" width="24" height="12" fill="#16e0bd"/>
    <rect x="68" y="100" width="24" height="12" fill="#16e0bd"/>
    <circle cx="42" cy="52" r="4" fill="#00ffcc" opacity="0.9"/>
  </g>
</svg>